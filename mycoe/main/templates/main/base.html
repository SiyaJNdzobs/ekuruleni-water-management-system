<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ekuruleni Water App{% endblock %}</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- ICONS (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<nav class="navbar">
    <a href="{% url 'home' %}"><i class="fa fa-home"></i> Home</a>

    <div class="dropdown">
        <button class="dropbtn">
            <i class="fa fa-cogs"></i> Services
        </button>
        <div class="dropdown-content">
            <a href="{% url 'report' %}">Report Issue</a>
            <a href="{% url 'pay' %}">Pay Bill</a>
            <a href="{% url 'status' %}">Track Status</a>
        </div>
    </div>

    <a href="{% url 'contact' %}"><i class="fa fa-envelope"></i> Contact</a>
    <a href="{% url 'privacy' %}"><i class="fa fa-lock"></i> Privacy</a>
    <a href="{% url 'about' %}"><i class="fa fa-info-circle"></i> About</a>

    <a class="login-btn" href="#">
        <i class="fa fa-user"></i> Sign / Login
    </a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    <div class="left">
        &copy; 2026 Ekuruleni Water Management
    </div>

    <div class="right">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
</footer>

</body>
</html>
