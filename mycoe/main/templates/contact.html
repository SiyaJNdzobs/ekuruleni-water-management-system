{% extends 'main/base.html' %}
{% block content %}
<section class="page-section">
    <h2>Contact Us</h2>
    <p>For assistance or feedback, reach us through the following:</p>
    <ul>
        <li>Email: support@ekuruleniwater.gov.za</li>
        <li>Phone: 011-123-4567</li>
        <li>Visit: Municipal offices, Ekuruleni</li>
    </ul>
    <h3>Send a message</h3>
    <form>
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="email" placeholder="Your Email" required><br><br>
        <textarea placeholder="Message" rows="4" required></textarea><br><br>
        <button type="submit">Send Message</button>
    </form>
</section>
{% endblock %}
