{% extends 'main/base.html' %}
{% block content %}
<h2>Report Water Issue</h2>
<form id="reportForm">
    <label>Upload Image:</label>
    <input type="file" id="photo" required><br><br>

    <label>Location:</label>
    <input type="text" id="location" placeholder="Enter location" required><br><br>

    <button type="submit">Submit Report</button>
</form>

<p id="reportFeedback" style="font-weight:bold;"></p>

<script>
document.getElementById('reportForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const loc = document.getElementById('location').value;
    document.getElementById('reportFeedback').innerText = 
        `Report submitted successfully for location: ${loc}`;
});
</script>
{% endblock %}
